apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-ui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-ui
  template:
    metadata:
      labels:
        app: vllm-ui
    spec:
      # 1. This allows the pod to ignore the "NoSchedule" restriction
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      
      # 2. This ensures it actually targets a control-plane node
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""

      containers:
        - name: vllm-ui
          image: saujandsre/vllm-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: vllm-config
                  key: MODEL_ID
            - name: VLLM_URL
              value: "http://vllm-api:8000"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
