apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-ui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-ui
  template:
    metadata:
      labels:
        app: vllm-ui
    spec:
      containers:
        - name: vllm-ui
          image: saujandsre/vllm-ui:latest    
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: vllm-config
                  key: MODEL_ID
            # *** CHANGED: point to router, not vLLM directly ***
            - name: VLLM_URL
              value: "http://inference-router:9090"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
